<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  
  <!-- Gold accent gradient background -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="90" fill="url(#goldGradient)"/>
  
  <!-- IK initials -->
  <text x="100" y="80" font-family="Poppins, sans-serif" font-size="52" font-weight="700" text-anchor="middle" fill="#f59e0b">IK</text>
  
  <!-- Strategic Services text -->
  <text x="100" y="115" font-family="Poppins, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#d1d5db">Strategic Services</text>
  
  <!-- Decorative line -->
  <line x1="55" y1="130" x2="145" y2="130" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
</svg>